name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ "main" ] # ඔයාගේ ප්‍රධාන branch එක main නම් මෙහෙම තියන්න

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite බිල්ඩ් එක හැදෙන්නේ dist ෆෝල්ඩර් එකටයි

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
